protocol bgp up_inberlin1 from peer6 {
  neighbor 2001:67c:1400::1 as 29670;
  source address IP6_HOST;

  ipv6 {
    import where incoming(29670);
    export where outgoing(29670);
  };

  local role customer;

  multihop 2;
}

