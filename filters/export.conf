function outgoing(int dst_asn; int role) -> bool
{
  drop_bogon_prefixes();
  drop_small_prefixes();
  drop_ixp_nets();
  drop_default_routes();
  # Only check bogon ASNs and RPKI for routes learned from peers (not locally originated)
  if bgp_path.len > 0 then {
    drop_bogon_asns();
    drop_long_aspaths();
    strip_private_asns();
    drop_rpki_invalid();
  }

  # Strip internal large communities before sending to peers
  clear_own_communities();

  # Honor no-export / no-advertise standard communities
  if (65535, 65281) ~ bgp_community then reject; # no-advertise
  if role = TRANSIT && (65535, 65282) ~ bgp_community then reject; # no-export

  return true;
}
